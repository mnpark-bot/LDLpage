const nowStr = () => new Date().toLocaleTimeString("ko-KR");

/* ── Atoms ── */
function Btn({ children, onClick, variant="ghost", style={}, disabled=false, sm=false }) {
  const base = { display:"inline-flex", alignItems:"center", gap:6, padding:sm?"5px 12px":"8px 16px", borderRadius:8, border:"none", cursor:disabled?"not-allowed":"pointer", fontFamily:"inherit", fontSize:sm?12:13, fontWeight:500, transition:"all 0.15s", opacity:disabled?0.45:1, whiteSpace:"nowrap", letterSpacing:-0.1 };
  const vars = {
    primary: { background:C.accent, color:"#fff", boxShadow:`0 1px 3px ${C.shadow}` },
    ghost:   { background:C.surf2, color:C.text2, border:`1px solid ${C.border}` },
    outline: { background:"transparent", color:C.text2, border:`1px solid ${C.border2}` },
    danger:  { background:C.redBg, color:C.red, border:"1px solid #f0c8c8" },
    success: { background:C.greenBg, color:C.green, border:"1px solid #c0dfc8" },
  };
  return <button style={{...base,...vars[variant],...style}} onClick={onClick} disabled={disabled}>{children}</button>;
}

function PlatformChip({ platform, style={} }) {
  const p = PLATFORMS[platform];
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:5, fontSize:11, fontWeight:600, padding:"3px 8px", borderRadius:20, background:p.bg, color:p.color, border:`1px solid ${p.color}28`, letterSpacing:-0.1, ...style }}>
      <span style={{ width:6, height:6, borderRadius:"50%", background:p.dot, flexShrink:0 }} />
      {p.name}
    </span>
  );
}

function Tag({ label, type }) {
  const c = { pos:{bg:C.greenBg,color:C.green,border:"#c0dfc8"}, neg:{bg:C.redBg,color:C.red,border:"#f0c8c8"}, neu:{bg:C.blueBg,color:C.blue,border:"#c0d8e8"} };
  const s = c[type]||c.neu;
  return <span style={{ background:s.bg, color:s.color, border:`1px solid ${s.border}`, fontSize:10, fontWeight:600, padding:"2px 7px", borderRadius:20, letterSpacing:0.1 }}>{label}</span>;
}

function Stars({ n, size=12 }) {
  return (
    <span style={{ display:"inline-flex", gap:1 }}>
      {[1,2,3,4,5].map(i=>(
        <Icon key={i} name="star" size={size} color={i<=n?C.yellow:C.border2} style={{fill:i<=n?C.yellowBg:"none"}}/>
      ))}
    </span>
  );
}

function Spinner() {
  return <span style={{ display:"inline-block", width:13, height:13, border:`2px solid rgba(201,100,66,0.25)`, borderTopColor:C.accent, borderRadius:"50%", animation:"spin 0.7s linear infinite" }}/>;
}

function Toggle({ on, onClick }) {
  return (
    <div onClick={onClick} style={{ width:36, height:20, borderRadius:10, cursor:"pointer", position:"relative", background:on?C.accent:C.border2, transition:"background 0.2s", flexShrink:0 }}>
      <div style={{ position:"absolute", width:14, height:14, background:"#fff", borderRadius:"50%", top:3, left:on?19:3, transition:"left 0.2s", boxShadow:"0 1px 3px rgba(0,0,0,0.15)" }}/>
    </div>
  );
}

// ── 서버 API 헬퍼 ─────────────────────────────────────────
const SERVER = "http://localhost:5000/api";

/* ── Main App ── */
function App() {
  const { useEffect } = React;
  const [reviews, setReviews]       = useState(INITIAL_REVIEWS.map(r=>({...r})));
  const [tab, setTab]               = useState("dashboard");
  const [selectedId, setSelectedId] = useState(null);
  const [platformFilter, setPlatformFilter] = useState("all");
  const [statusFilter, setStatusFilter]     = useState("all");
  const [starFilter, setStarFilter]         = useState("all");
  const [generating, setGenerating] = useState(false);
  const [posting, setPosting]       = useState(false);
  const [autoRunning, setAutoRunning] = useState(false);
  const [editing, setEditing]       = useState(false);
  const [editText, setEditText]     = useState("");
  const [toast, setToast]           = useState({ msg:"", type:"success", show:false });
  const [logs, setLogs]             = useState([{ type:"info", msg:"OmniReview 초기화 완료", time:nowStr() }]);
  const [claudeKey, setClaudeKey]   = useState("");
  const [serverOk, setServerOk]     = useState(null);
  const [autoPost, setAutoPost]     = useState(false);
  const [scheduleOn, setScheduleOn] = useState(false);
  const [systemPrompt, setSystemPrompt] = useState("쿠팡·네이버·11번가·카카오·G마켓 통합 셀러 고객 응대입니다.\n별점 4-5점: 진심 어린 감사 인사와 재구매 유도\n별점 3점: 감사 인사와 개선 약속\n별점 1-2점: 진심 어린 사과와 구체적 해결책\n2-3문장, 150자 이내로 자연스럽게 작성하세요.");

  const addLog = useCallback((type, msg) => setLogs(p=>[{type,msg,time:nowStr()},...p].slice(0,200)),[]);
  const showToast = useCallback((msg,type="success")=>{ setToast({msg,type,show:true}); setTimeout(()=>setToast(t=>({...t,show:false})),3000); },[]);

  // 서버 상태 체크
  useEffect(()=>{
    fetch(SERVER+"/status")
      .then(r=>r.json())
      .then(d=>{ setServerOk(d); addLog("success",`✅ 서버 연결됨 — 쿠팡:${d.coupang} / Claude:${d.claude}`); })
      .catch(()=>{ setServerOk(false); addLog("info","⚠️ 서버 미연결 — 데모 모드로 실행"); });
  },[]);

  const filtered = useMemo(()=> reviews.filter(r=>{
    if (platformFilter!=="all" && r.platform!==platformFilter) return false;
    if (statusFilter!=="all" && r.status!==statusFilter) return false;
    if (starFilter!=="all" && r.stars!==Number(starFilter)) return false;
    return true;
  }),[reviews,platformFilter,statusFilter,starFilter]);

  const selected     = reviews.find(r=>r.id===selectedId);
  const pendingCount = reviews.filter(r=>r.status==="pending").length;
  const doneCount    = reviews.filter(r=>r.status==="done").length;
  const avgRating    = (reviews.reduce((a,r)=>a+r.stars,0)/reviews.length).toFixed(1);

  const platformStats = useMemo(()=>
    Object.keys(PLATFORMS).map(pid=>({
      pid,
      total:   reviews.filter(r=>r.platform===pid).length,
      pending: reviews.filter(r=>r.platform===pid&&r.status==="pending").length,
      avg:     (reviews.filter(r=>r.platform===pid).reduce((a,r)=>a+r.stars,0)/(reviews.filter(r=>r.platform===pid).length||1)).toFixed(1),
    }))
  ,[reviews]);

  // 쿠팡 리뷰 실제 동기화
  async function syncCoupangReviews() {
    if (!serverOk || serverOk.coupang!=="connected") {
      addLog("info","서버 미연결 — 데모 데이터 사용 중");
      showToast("서버 미연결 — 데모 모드","error");
      return;
    }
    try {
      addLog("info","쿠팡 Wing API 리뷰 동기화 중...");
      const res  = await fetch(SERVER+"/reviews");
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const items = data.data || data.reviewList || [];
      if (!items.length){ addLog("info","새 리뷰 없음"); return; }
      const mapped = items.map(r=>({
        id:      String(r.reviewId||r.id),
        platform:"coupang",
        name:    r.reviewerName||r.nickname||"익명",
        stars:   r.rating||r.starRating||5,
        product: r.productName||r.itemName||"",
        text:    r.reviewContent||r.content||"",
        time:    r.orderDate||r.createdAt||"방금",
        status:  r.replyContent?"done":"pending",
        tags:    [],
        reply:   r.replyContent||"",
      }));
      setReviews(prev=>{
        const ids = new Set(prev.map(r=>r.id));
        const newOnes = mapped.filter(r=>!ids.has(r.id));
        return [...newOnes,...prev];
      });
      addLog("success",`쿠팡 리뷰 ${items.length}건 동기화 완료`);
      showToast(`쿠팡 리뷰 ${items.length}건 동기화 완료`);
    } catch(e){ addLog("error",`동기화 실패: ${e.message}`); showToast(`동기화 실패: ${e.message}`,"error"); }
  }

  async function selectReview(id) {
    setSelectedId(id); setEditing(false);
    const r = reviews.find(x=>x.id===id);
    if (r && !r.reply) await doGenerate(id);
    else if (r) setEditText(r.reply);
  }

  async function doGenerate(id) {
    const r = reviews.find(x=>x.id===id);
    if (!r) return;
    setGenerating(true); setEditing(false);
    try {
      let reply = "";
      // ① 서버 경유 Claude 생성
      if (serverOk && (serverOk.claude==="connected" || claudeKey.startsWith("sk-ant-"))) {
        const res = await fetch(SERVER+"/claude/generate", {
          method:"POST",
          headers:{"Content-Type":"application/json","X-Claude-Key":claudeKey},
          body:JSON.stringify({ platform:PLATFORMS[r.platform].name, product:r.product, stars:r.stars, text:r.text, systemPrompt }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        reply = data.reply;
      } else {
        // ② 서버 없을 때 데모
        await new Promise(res=>setTimeout(res,1300));
        reply = (DEMO_REPLY[r.stars]||DEMO_REPLY[3])(r.name);
      }
      setReviews(p=>p.map(x=>x.id===id?{...x,reply}:x));
      setEditText(reply);
      addLog("success",`[${PLATFORMS[r.platform].name}] ${r.name} 답변 생성 완료`);
    } catch(e) { addLog("error",`오류: ${e.message}`); showToast(e.message,"error"); }
    setGenerating(false);
  }

  async function postReply() {
    if (!selected?.reply){ showToast("먼저 AI 답변을 생성하세요","error"); return; }
    setPosting(true);
    try {
      // 쿠팡 플랫폼이고 서버 연결됐으면 실제 게시
      if (selected.platform==="coupang" && serverOk && serverOk.coupang==="connected") {
        const res = await fetch(`${SERVER}/reviews/${selected.id}/reply`,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({replyContent: editing ? editText : selected.reply}),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        addLog("success",`[쿠팡] ${selected.name} 답변 실제 게시 완료`);
      } else {
        await new Promise(res=>setTimeout(res,800));
        addLog("success",`[${PLATFORMS[selected.platform].name}] ${selected.name} 답변 게시 (데모)`);
      }
      setReviews(p=>p.map(x=>x.id===selectedId?{...x,status:"done",reply:editing?editText:x.reply}:x));
      setEditing(false);
      showToast(`${PLATFORMS[selected.platform].name}에 답변을 게시했습니다`);
    } catch(e){ addLog("error",`게시 실패: ${e.message}`); showToast(e.message,"error"); }
    setPosting(false);
  }

  async function runAutoReply() {
    const pend = reviews.filter(r=>r.status==="pending"&&(platformFilter==="all"||r.platform===platformFilter));
    if (!pend.length){ showToast("대기중인 리뷰가 없습니다","error"); return; }
    setAutoRunning(true);
    addLog("info",`자동 답변 시작: ${pend.length}건`);
    for (const r of pend) {
      addLog("info",`[${PLATFORMS[r.platform].name}] ${r.name} 처리 중...`);
      let reply = "";
      try {
        if (serverOk && (serverOk.claude==="connected"||claudeKey.startsWith("sk-ant-"))) {
          const res = await fetch(SERVER+"/claude/generate",{
            method:"POST", headers:{"Content-Type":"application/json","X-Claude-Key":claudeKey},
            body:JSON.stringify({platform:PLATFORMS[r.platform].name,product:r.product,stars:r.stars,text:r.text,systemPrompt}),
          });
          const d = await res.json();
          reply = d.reply || (DEMO_REPLY[r.stars]||DEMO_REPLY[3])(r.name);
        } else {
          await new Promise(res=>setTimeout(res,400));
          reply = (DEMO_REPLY[r.stars]||DEMO_REPLY[3])(r.name);
        }
        // 쿠팡은 실제 게시
        if (r.platform==="coupang" && serverOk && serverOk.coupang==="connected") {
          await fetch(`${SERVER}/reviews/${r.id}/reply`,{
            method:"POST", headers:{"Content-Type":"application/json"},
            body:JSON.stringify({replyContent:reply}),
          });
        }
        setReviews(p=>p.map(x=>x.id===r.id?{...x,reply,status:"done"}:x));
        addLog("success",`[${PLATFORMS[r.platform].name}] ${r.name} 완료`);
      } catch(e){ addLog("error",`[${r.name}] 실패: ${e.message}`); }
    }
    showToast(`${pend.length}건 자동 답변 완료`);
    setAutoRunning(false);
  }

                      </>
                  }
                </div>
                {selected && (
                  <div style={{ padding:"12px 14px", borderTop:`1px solid ${C.border}`, display:"flex", gap:6, background:C.surf }}>
                    {editing?<>
                      <Btn sm variant="outline" onClick={()=>setEditing(false)}><Icon name="x" size={12} color={C.text2}/> 취소</Btn>
                      <Btn sm variant="ghost"   onClick={()=>{ setReviews(p=>p.map(x=>x.id===selectedId?{...x,reply:editText}:x)); setEditing(false); }}><Icon name="save" size={12} color={C.text2}/> 저장</Btn>
                    </>:<>
                      <Btn sm variant="outline" onClick={()=>{setEditing(true);setEditText(selected.reply);}} disabled={generating}><Icon name="edit" size={12} color={C.text2}/> 수정</Btn>
                      <Btn sm variant="outline" onClick={()=>doGenerate(selectedId)} disabled={generating}><Icon name="regenerate" size={12} color={C.text2}/> 재생성</Btn>
                    </>}
                    <Btn variant="primary" sm style={{flex:1,justifyContent:"center"}} onClick={postReply} disabled={posting||generating||editing}>
                      {posting?<><Spinner/> 게시중...</>:<><Icon name="send" size={12} color="#fff"/> {PLATFORMS[selected.platform].name}에 게시</>}
                    </Btn>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ─ CONFIG ─ */}
          {tab==="config" && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
              {Object.entries(PLATFORMS).map(([pid,p])=>(
                <div key={pid} style={card}>
                  <div style={{...cardHeader, borderTop:`2px solid ${p.color}`}}>
                    <span style={{ width:9, height:9, borderRadius:"50%", background:p.dot }}/> {p.name} API 설정
                  </div>
                  <div style={{ padding:16 }}>
                    <div style={{ fontSize:11, color:C.text2, fontWeight:500, marginBottom:8 }}>
                      {pid==="coupang"?"Wing API":pid==="naver"?"커머스 API":pid==="eleven"?"Open API":"비즈니스 API"} 연동
                    </div>
                    {pid==="coupang"&&<>
                      <input placeholder="Access Key" style={{ width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontFamily:"inherit",fontSize:12,marginBottom:7,outline:"none" }}/>
                      <input placeholder="Secret Key" type="password" style={{ width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontFamily:"inherit",fontSize:12,marginBottom:7,outline:"none" }}/>
                      <input placeholder="Vendor ID" style={{ width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontFamily:"inherit",fontSize:12,outline:"none" }}/>
                    </>}
                    {pid==="naver"&&<>
                      <input placeholder="Client ID" style={{ width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontFamily:"inherit",fontSize:12,marginBottom:7,outline:"none" }}/>
                      <input placeholder="Client Secret" type="password" style={{ width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontFamily:"inherit",fontSize:12,outline:"none" }}/>
                    </>}
                    {(pid==="eleven"||pid==="kakao"||pid==="gmarket")&&<>
                      <input placeholder="API Key" type="password" style={{ width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontFamily:"inherit",fontSize:12,marginBottom:7,outline:"none" }}/>
                      <input placeholder="Partner / Store ID" style={{ width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontFamily:"inherit",fontSize:12,outline:"none" }}/>
                    </>}
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:14 }}>
                      <Btn sm variant="primary" onClick={()=>showToast(`${p.name} 설정 저장 완료`)}><Icon name="save" size={12} color="#fff"/> 저장</Btn>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontSize:11, color:C.text2 }}>자동 답변</span>
                        <Toggle on={false} onClick={()=>{}}/>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
              <div style={{...card, gridColumn:"1/-1"}}>
                <div style={cardHeader}><Icon name="robot" size={15} color={C.text3}/> Claude AI 설정</div>
                <div style={{ padding:16, display:"flex", gap:10, alignItems:"center" }}>
                  <input value={claudeKey} onChange={e=>setClaudeKey(e.target.value)} type="password" placeholder="Anthropic API Key (sk-ant-...)" style={{ flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontFamily:"inherit",fontSize:12,outline:"none" }}/>
                  <Btn sm variant="primary" onClick={()=>{ showToast("Claude AI 설정 저장 완료"); addLog("success","API 키 저장"); }}><Icon name="save" size={12} color="#fff"/> 저장</Btn>
                  {!claudeKey&&<span style={{ fontSize:11, color:C.text3, whiteSpace:"nowrap" }}>미입력 시 데모 모드</span>}
                </div>
              </div>
            </div>
          )}

          {/* ─ PROMPT ─ */}
          {tab==="prompt" && (
            <div style={{ maxWidth:700 }}>
              <div style={card}>
                <div style={cardHeader}><Icon name="prompt" size={15} color={C.text3}/> AI 프롬프트 설정</div>
                <div style={{ padding:18 }}>
                  <div style={{ fontSize:11, color:C.text2, fontWeight:500, marginBottom:8 }}>시스템 프롬프트</div>
                  <textarea value={systemPrompt} onChange={e=>setSystemPrompt(e.target.value)} style={{ width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:9,padding:13,fontSize:13,lineHeight:1.8,color:C.text,fontFamily:"inherit",resize:"vertical",minHeight:160,outline:"none" }}/>
                  <div style={{ fontSize:12, color:C.text3, margin:"10px 0 16px", display:"flex", alignItems:"flex-start", gap:6 }}>
                    <Icon name="info" size={13} color={C.text3} style={{marginTop:1,flexShrink:0}}/>
                    플랫폼별로 다른 톤을 원하시면 "쿠팡 리뷰의 경우 ~" 형식으로 추가하세요.
                  </div>
                  <Btn sm variant="primary" onClick={()=>{ showToast("프롬프트 저장 완료"); addLog("success","프롬프트 저장"); }}><Icon name="save" size={12} color="#fff"/> 저장</Btn>
                </div>
              </div>
            </div>
          )}

          {/* ─ LOGS ─ */}
          {tab==="logs" && (
            <div style={card}>
              <div style={cardHeader}>
                <Icon name="log" size={15} color={C.text3}/> 실행 로그
                <span style={{ fontSize:11, color:C.text3, fontWeight:400 }}>{logs.length}개</span>
                <Btn sm variant="outline" style={{marginLeft:"auto"}} onClick={()=>setLogs([])}><Icon name="trash" size={12} color={C.text2}/> 초기화</Btn>
              </div>
              <div style={{ padding:"10px 16px", fontFamily:"'Menlo','Courier New',monospace", fontSize:11, lineHeight:2.1, maxHeight:"calc(100vh - 220px)", overflow:"auto" }}>
                {logs.length===0
                  ? <div style={{ color:C.text3, textAlign:"center", padding:40 }}>로그 없음</div>
                  : logs.map((l,i)=>(
                    <div key={i} style={{ color:l.type==="success"?C.green:l.type==="error"?C.red:C.blue }}>
                      [{l.time}] {l.msg}
                    </div>
                  ))
                }
              </div>
            </div>
          )}

        </div>
      </div>

      {/* Toast */}
      <div style={{ position:"fixed", bottom:22, right:22, background:C.surf, border:`1px solid ${toast.type==="success"?"#c0dfc8":"#f0c8c8"}`, borderRadius:10, padding:"11px 16px", fontSize:13, fontWeight:500, display:"flex", alignItems:"center", gap:9, boxShadow:`0 4px 20px ${C.shadow}`, transition:"all 0.3s cubic-bezier(0.34,1.56,0.64,1)", transform:toast.show?"translateY(0)":"translateY(80px)", opacity:toast.show?1:0, pointerEvents:toast.show?"auto":"none", zIndex:999, color:C.text }}>
        <div style={{ width:7, height:7, borderRadius:"50%", background:toast.type==="success"?C.green:C.red, flexShrink:0 }}/>
        {toast.msg}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
